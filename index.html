<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi primera página</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #1a1a2e; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .pantalla { width: 100%; display: flex; justify-content: center; align-items: center; }
    .oculto { display: none; }
    .tarjeta { background-color: #16213e; color: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); width: 300px; }
    h1, h2 { margin-bottom: 20px; }
    p { margin-bottom: 15px; color: #aaaaaa; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 25px; background-color: #0f3460; color: white; font-size: 15px; text-align: center; }
    input::placeholder { color: #aaaaaa; }
    button { background-color: #e94560; color: white; padding: 12px 30px; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; display: block; width: 100%; margin-bottom: 10px; }
    button:hover { background-color: #c73652; }
    .error { color: #e94560; font-size: 14px; margin-top: 10px; }
    .btn-tema { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; border-radius: 50%; background-color: #e94560; font-size: 20px; cursor: pointer; border: none; z-index: 999; padding: 0; }
    body.claro { background-color: #f0f0f0; }
    body.claro .tarjeta { background-color: #ffffff; color: #1a1a2e; box-shadow: 0 0 30px rgba(0,0,0,0.2); }
    body.claro input { background-color: #e0e0e0; color: #1a1a2e; }
    body.claro p { color: #555555; }
    @keyframes entrar { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .tarjeta { animation: entrar 0.4s ease; }
  </style>
</head>
<body>
  <button class="btn-tema" onclick="cambiarTema()">🌙</button>

  <div class="pantalla" id="pantalla1">
    <div class="tarjeta">
      <h1>Iniciar sesión 🔐</h1>
      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="contrasena" placeholder="Contraseña">
      <button onclick="login()">Entrar →</button>
      <p id="error" class="oculto error">❌ Usuario o contraseña incorrectos</p>
    </div>
  </div>

  <div class="pantalla oculto" id="pantalla2">
    <div class="tarjeta">
      <h2>Menú principal 👋</h2>
      <button onclick="irA('pantalla3')">👤 Perfil</button>
      <button onclick="irA('pantalla4')">⚙️ Configuración</button>
      <button onclick="cerrarSesion()">🚪 Cerrar sesión</button>
    </div>
  </div>

  <div class="pantalla oculto" id="pantalla3">
    <div class="tarjeta">
      <h2>👤 Perfil</h2>
      <p>Aquí va tu información personal</p>
      <button onclick="irA('pantalla2')">← Volver</button>
    </div>
  </div>

  <div class="pantalla oculto" id="pantalla4">
    <div class="tarjeta">
      <h2>⚙️ Configuración</h2>
      <p>Aquí van las configuraciones</p>
      <button onclick="irA('pantalla2')">← Volver</button>
    </div>
  </div>

  <script>
    function irA(pantallaId) {
      document.querySelectorAll(".pantalla").forEach(p => p.classList.add("oculto"));
      document.querySelector("#" + pantallaId).classList.remove("oculto");
    }
    function login() {
      const usuario = document.querySelector("#usuario").value;
      const contrasena = document.querySelector("#contrasena").value;
      const error = document.querySelector("#error");
      if (usuario === "admin" && contrasena === "1234") {
        error.classList.add("oculto");
        irA("pantalla2");
      } else {
        error.classList.remove("oculto");
      }
    }
    function cerrarSesion() {
      document.querySelector("#usuario").value = "";
      document.querySelector("#contrasena").value = "";
      irA("pantalla1");
    }
    function cambiarTema() {
      const body = document.querySelector("body");
      const btn = document.querySelector(".btn-tema");
      body.classList.toggle("claro");
      btn.textContent = body.classList.contains("claro") ? "☀️" : "🌙";
    }
  </script>
</body>
</html>
